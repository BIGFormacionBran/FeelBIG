name: Notify Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  refresh-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Restart HF Space
        run: |
          curl -X POST https://huggingface.co/api/spaces/BIGFormacionBran/feelbig-preview/restart \
          -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"