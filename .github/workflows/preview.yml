name: PHP Preview Server
on: 
  workflow_dispatch:

jobs:
  serve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install LocalTunnel
        run: sudo npm install -g localtunnel

      - name: Start PHP Server and Tunnel
        run: |
          php -S 0.0.0.0:8080 & 
          sleep 5
          # Generamos la URL y la guardamos en un archivo temporal
          lt --port 8080 > url.txt &
          sleep 5
          # Extraemos la URL y la mostramos claramente
          export TUNNEL_URL=$(grep -o 'https://[^ ]*' url.txt)
          echo "URL_DETECTADA=$TUNNEL_URL"
          # Mantenemos el proceso vivo
          tail -f url.txt
