name: Sync to Hugging Face
on:
  push:
    branches: [main] # Se activa cada vez que subes algo
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hugging Face Rebuild
        run: |
          curl -X POST https://huggingface.co/api/spaces/TU_USUARIO/feelbig-preview/restart \
               -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"